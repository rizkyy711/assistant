name: Auto Unzip File

on:
  push:
    paths:
      - '*.zip' # Berjalan otomatis hanya jika ada file .zip yang di-push

jobs:
  unzip-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan agar GitHub Actions bisa commit kembali hasil ekstrak

    steps:
      # 1. Checkout repositori kamu
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Cari dan Ekstrak file zip
      - name: Unzip File
        run: |
          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Mengekstrak $file..."
              unzip -o "$file" -d ./hasil-ekstrak # Menyimpan hasil ke folder 'hasil-ekstrak'
              rm "$file" # Hapus file .zip asli agar repo tidak penuh (opsional)
            fi
          done

      # 3. Commit dan Push kembali hasil ekstrak ke GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-unzip file [skip ci]" || echo "Tidak ada perubahan untuk di-commit"
          git push
