name: Auto Unzip File

on:
  push:
    branches:
      - main

jobs:
  unzip-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Ambil file dari repositori
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Intip isi folder untuk memastikan file zip-nya masuk atau tidak
      - name: Cek Daftar File
        run: |
          echo "=== DAFTAR FILE DI REPO ==="
          ls -la
          echo "==========================="

      # 3. Proses Unzip dengan pengaman (agar tidak langsung error merah)
      - name: Ekstrak File Zip
        run: |
          found_zip=false
          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Menemukan file zip: $file"
              # Pastikan aplikasi unzip terinstall
              sudo apt-get update && sudo apt-get install -y unzip
              
              # Lakukan ekstrak langsung ke root
              unzip -o "$file" -d . || echo "Gagal mengekstrak $file (mungkin file zip rusak/kosong)"
              
              # Hapus file asli
              rm "$file"
              found_zip=true
            fi
          done
          
          if [ "$found_zip" = false ]; then
            echo "Peringatan: Tidak ada file .zip yang terdeteksi di root folder!"
          fi

      # 4. Simpan kembali perubahan ke GitHub
      - name: Commit dan Push Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            echo "Ada file baru, melakukan commit..."
            git commit -m "Auto-unzip file hasil upload [skip ci]"
            git push origin main
          else
            echo "Aman. Tidak ada perubahan file baru yang perlu dicommit."
          fi
