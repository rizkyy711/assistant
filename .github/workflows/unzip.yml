name: Auto Unzip File

on:
  push:
    branches:
      - main
    paths:
      - '**.zip' # SCRIPT HANYA AKAN JALAN JIKA ADA FILE .ZIP MASUK

jobs:
  unzip-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Ambil file dari repositori dengan token keamanan bawaan
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Proses Ekstrak Aman
      - name: Ekstrak File Zip
        run: |
          # Cari file zip di root folder
          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Mengekstrak file: $file"
              unzip -o "$file" -d .
              rm "$file"
            fi
          done

      # 3. Simpan Balik ke GitHub (Menggunakan metode paksa agar tidak bentrok)
      - name: Commit dan Push Hasil
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-unzip file hasil upload [skip ci]"
            git push origin main
          else
            echo "Aman, tidak ada perubahan."
          fi
